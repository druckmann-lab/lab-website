    <script type="module">
        import { NEWS, formatDate } from './src/data/news.js';

        // Get date from URL
        const params = new URLSearchParams(window.location.search);
        const dateParam = params.get('date');

        // Find the news item
        const newsItem = NEWS.find(item => item.date === dateParam);

        const main = document.getElementById('main-content');

        if (!newsItem) {
            // Not found state
            main.innerHTML = `
                <div class="news-not-found">
                    <h1 class="news-not-found__title">News item not found</h1>
                    <p class="news-not-found__text">The news item you're looking for doesn't exist or has been removed.</p>
                    <a href="news.html" class="btn btn--secondary">← Back to News</a>
                </div>
            `;
        } else {
            // Update page title
            document.title = `${newsItem.title} — Druckmann Lab`;

            // Render header
            let content = `
                <header class="news-header">
                    <div class="container">
                        <a href="news.html" class="news-header__back">← Back to News</a>
                        <time class="news-header__date">${formatDate(newsItem.date)}</time>
                        <h1 class="news-header__title">${newsItem.title}</h1>
                        ${newsItem.description ? `<p class="news-header__description">${newsItem.description}</p>` : ''}
                        ${newsItem.tags ? `
                            <div class="news-header__tags">
                                ${newsItem.tags.map(tag => `<span class="news-header__tag">${tag}</span>`).join('')}
                            </div>
                        ` : ''}
                    </div>
                </header>
            `;

            // If there's a contentPath, load the markdown
            if (newsItem.contentPath) {
                content += `
                    <section class="news-content">
                        <div class="container">
                            <div class="news-content__inner">
                                <div class="news-content__body" id="markdown-content">
                                    Loading...
                                </div>
                                ${newsItem.link ? `
                                    <a href="${newsItem.link}" class="news-content__external" target="_blank">
                                        View External Link →
                                    </a>
                                ` : ''}
                            </div>
                        </div>
                    </section>
                `;

                main.innerHTML = content;

                // Load markdown content
                fetch(`public/posts/${newsItem.contentPath}`)
                    .then(res => {
                        if (!res.ok) throw new Error('Not found');
                        return res.text();
                    })
                    .then(md => {
                        // Simple markdown to HTML conversion
                        const html = parseMarkdown(md);
                        document.getElementById('markdown-content').innerHTML = html;
                    })
                    .catch(() => {
                        document.getElementById('markdown-content').innerHTML = `
                            <p style="color: var(--color-text-secondary); font-style: italic;">
                                Extended content not available.
                            </p>
                        `;
                    });
            } else if (newsItem.link) {
                // Just show external link
                content += `
                    <section class="news-content">
                        <div class="container">
                            <div class="news-content__inner">
                                <a href="${newsItem.link}" class="news-content__external" target="_blank">
                                    View External Link →
                                </a>
                            </div>
                        </div>
                    </section>
                `;
                main.innerHTML = content;
            } else {
                main.innerHTML = content;
            }
        }

        // Simple markdown parser
        function parseMarkdown(md) {
            let html = md
                // Headers
                .replace(/^### (.*$)/gm, '<h3>$1</h3>')
                .replace(/^## (.*$)/gm, '<h2>$1</h2>')
                .replace(/^# (.*$)/gm, '<h2>$1</h2>')
                // Bold
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                // Italic
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                // Images (BEFORE links)
                .replace(/!\[(.*?)\]\((.*?)\)/g, '<img src="$2" alt="$1">')
                // Links
                .replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank">$1</a>')
                // Unordered lists
                .replace(/^\s*[-*]\s+(.*$)/gm, '<li>$1</li>')
                // Blockquotes
                .replace(/^>\s+(.*$)/gm, '<blockquote>$1</blockquote>')
                // Paragraphs
                .replace(/\n\n/g, '</p><p>')
                // Wrap in paragraph
                .replace(/^(.+)$/gm, (match) => {
                    if (match.startsWith('<')) return match;
                    return match;
                });

            // Wrap consecutive <li> elements in <ul>
            html = html.replace(/((?:<li>.*<\/li>\s*)+)/g, '<ul>$1</ul>');

            return html;
        }

        // Nav scroll effect
        const nav = document.getElementById('nav');
        window.addEventListener('scroll', () => {
            nav.classList.toggle('scrolled', window.scrollY > 50);
        });

        // Mobile menu toggle
        const toggle = document.querySelector('.nav__toggle');
        const links = document.querySelector('.nav__links');
        toggle?.addEventListener('click', () => {
            toggle.classList.toggle('active');
            links.classList.toggle('active');
        });
    </script>
    <script src="src/theme-switcher.js"></script>
</body>
